services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema-kettal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sistema_kettal}
      POSTGRES_USER: ${POSTGRES_USER:-kettal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kettal_dev_123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kettal} -d ${POSTGRES_DB:-sistema_kettal}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistema-kettal-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kettal}:${POSTGRES_PASSWORD:-kettal_dev_123}@postgres:5432/${POSTGRES_DB:-sistema_kettal}?schema=public
      NODE_ENV: production
      CONTAINER_NAME: sistema-kettal-app
    ports:
      - "3017:3000"
    volumes:
      - ${BACKUP_PATH:-./backups}:/app/backups
      - ./.env:/app/.env.host
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
